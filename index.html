<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    <title>Aryan Krishan | Welcome to My Universe</title>
    <style>
        /* CSS Variables & Base Styles */
        :root {
            --primary-color: #0f172a;
            --secondary-color: #3b82f6;
            --text-color: #ffffff;
        }

        /* FLAW 1 FIXED: The missing 'body' word is restored */
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-color);
            line-height: 1.6;
            background-color: #020205; 
            
            /* FLAW 2 FIXED: These lock the screen and stop the scrolling */
            height: 100vh;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M7.127 22.562l-7.127 1.438 1.438-7.128 5.689 5.69zm1.414-1.414l11.228-11.225-5.69-5.692-11.227 11.227 5.689 5.69zm9.768-21.148l-2.816 2.817 5.691 5.691 2.816-2.819-5.691-5.689z" fill="%23ffffff"/></svg>') 0 24, auto;
        }

        /* Space Canvas Background */
        #space-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }

        /* Sparkle Effect */
        .sparkle {
            position: fixed; pointer-events: none; width: 4px; height: 4px;
            background-color: white; border-radius: 50%;
            box-shadow: 0 0 8px 2px rgba(255, 255, 255, 0.8); z-index: 9999;
            animation: sparkleFade 0.8s ease-out forwards;
        }
        @keyframes sparkleFade { 0% { opacity: 1; transform: scale(1) translateY(0); } 100% { opacity: 0; transform: scale(0.1) translateY(15px); } }

        /* Intro Sequence Overlay */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: transparent; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; transition: opacity 1.5s ease, transform 1.5s ease;
        }
        #intro-overlay h1 { font-size: 4rem; letter-spacing: 2px; margin-bottom: 30px; font-weight: 300; text-align: center; }

        #lets-go-btn {
            padding: 12px 40px; font-size: 1.2rem; background-color: transparent; color: white; border: 1px solid white; 
            border-radius: 30px; cursor: inherit; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px;
        }
        #lets-go-btn:hover { background-color: white; color: black; box-shadow: 0 0 20px rgba(255,255,255,0.3); }

        /* Navigation */
        nav {
            background-color: rgba(5, 5, 10, 0.5); backdrop-filter: blur(10px); color: white; padding: 1.5rem 5%; 
            display: flex; justify-content: space-between; align-items: center; opacity: 0; transition: opacity 1s ease; z-index: 100;
        }
        nav h1 { margin: 0; font-size: 1.2rem; font-weight: 600; letter-spacing: 1px; }
        .nav-links { display: flex; gap: 25px; }
        .nav-links a { color: #94a3b8; text-decoration: none; font-weight: 400; font-size: 0.95rem; cursor: inherit; transition: color 0.3s ease; }
        .nav-links a:hover, .nav-links a.active { color: white; }

        /* General Sections */
        .page-section { display: none; flex: 1; padding: 0 5%; animation: fadeIn 0.5s ease; position: relative; }
        
        /* Modifying how the active page displays to keep vertical centering */
        .page-section.active { display: flex; align-items: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Hero Section Container */
        .hero-container {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; height: 100%;
        }

        .hero-text { flex: 1.2; }
        
        .hero-text h1 { font-size: 4rem; line-height: 1.2; margin: 0 0 30px 0; font-weight: 500; }
        
        /* Forces Name to one line */
        .name-line { white-space: nowrap; }
        
        /* Forces Title to the next line automatically */
        .title-line { display: block; font-size: 3.5rem; color: #cbd5e1; margin-top: 10px; font-weight: 400; }

        .hero-buttons { display: flex; gap: 20px; }
        .pill-btn {
            background-color: white; color: #000; font-size: 1rem; font-weight: 500; padding: 12px 35px; 
            border-radius: 50px; border: none; cursor: inherit; transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .pill-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }

        /* FLAW 3 FIXED: Image Middle Vertical, Right Horizontal */
        .hero-image {
            flex: 1;
            display: flex;
            justify-content: flex-end; /* Pushes image to the RIGHT */
            align-items: center; /* Pushes image to the MIDDLE VERTICAL */
            height: 100%;
        }

        .hero-image img {
            max-height: 75vh; /* Large, but safely fits inside the screen */
            max-width: 100%; 
            object-fit: contain; 
        }

        /* Chatbot: aryan jr. */
        #chatbot-container { position: fixed; bottom: 20px; right: 20px; width: 320px; z-index: 1000; color: #333; }
        #chatbot-header { background-color: white; color: black; padding: 15px; border-radius: 12px 12px 0 0; cursor: inherit; font-weight: 600; display: flex; justify-content: space-between; }
        #chatbot-window { background: white; border-radius: 0 0 12px 12px; display: none; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #chatbot-messages { height: 250px; padding: 15px; overflow-y: auto; font-size: 0.9rem; border-bottom: 1px solid #eee; background: #f8fafc; }
        .bot-msg { background: #e2e8f0; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: inline-block;}
        #chatbot-input-area { display: flex; padding: 10px; background: white; border-radius: 0 0 12px 12px;}
        #chatbot-input-area input { margin-bottom: 0; border: 1px solid #ddd; border-radius: 6px 0 0 6px; color: black; background: white; padding: 10px; width: 100%; box-sizing: border-box;}
        #chatbot-input-area button { border-radius: 0 6px 6px 0; padding: 10px 15px; background-color: black; color: white; border: none; cursor: inherit;}
    </style>
</head>
<body>

    <canvas id="space-canvas"></canvas>

    <div id="intro-overlay">
        <h1>Welcome to my Universe</h1>
        <button id="lets-go-btn" onclick="startJourney()">Let's go</button>
    </div>

    <nav id="main-nav">
        <h1>Aryan Krishan</h1>
        <div class="nav-links">
            <a onclick="showPage('home')" class="active" id="link-home">Home</a>
            <a href="aboutme.html" id="link-about">About</a>
            <a href="projects.html" id="link-projects">Projects</a>
            <a onclick="showPage('blogs')" id="link-blogs">Blogs</a>
            <a onclick="showPage('contact')" id="link-contact">Contact Me</a>
        </div>
    </nav>

    <main id="home" class="page-section active">
        <div class="hero-container">
            <div class="hero-text">
                <h1>
                    Hi,<br>
                    <span class="name-line">I'm Aryan Krishan</span>
                    <span class="title-line">Product and Marketing guy</span>
                </h1>
                <div class="hero-buttons">
                    <button class="pill-btn" onclick="window.location.href='projects.html'">My Work</button>
                    <button class="pill-btn" onclick="window.open('M24MSA016_AryanKrishan (1).pdf', '_blank')">Resume</button>
                </div>
            </div>
            <div class="hero-image">
                <img src="Aryan Krishan.png" alt="Aryan Krishan">
            </div>
        </div>
    </main>

    <div id="chatbot-container">
        <div id="chatbot-header" onclick="toggleChat()">
            <span>Aryan jr.</span>
            <span id="chat-icon">▲</span>
        </div>
        <div id="chatbot-window">
            <div id="chatbot-messages">
                <div class="bot-msg">Hi! I'm aryan jr. How can I help you navigate Aryan's universe today?</div>
            </div>
            <div id="chatbot-input-area">
                <input type="text" id="chat-input" placeholder="Ask something..." onkeypress="handleChat(event)">
                <button onclick="sendMsg()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // --- SPARKLE CURSOR LOGIC ---
        let lastSparkleTime = 0;
        document.addEventListener('mousemove', function(e) {
            const now = Date.now();
            if (now - lastSparkleTime > 40) {
                createSparkle(e.clientX, e.clientY);
                lastSparkleTime = now;
            }
        });

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = (x - 2) + 'px';
            sparkle.style.top = (y + 10) + 'px';
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 800);
        }

        // --- NEW REALISTIC 3D STARFIELD & WARP LOGIC ---
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let stars = [];
        const numStars = 600;
        let speed = 0.2; 
        let isWarping = false;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        for (let i = 0; i < numStars; i++) {
            stars.push({
                x: Math.random() * width * 2 - width,
                y: Math.random() * height * 2 - height,
                z: Math.random() * width,
                pz: Math.random() * width 
            });
        }

        function drawStars() {
            ctx.fillStyle = isWarping ? 'rgba(2, 2, 5, 0.2)' : 'rgba(2, 2, 5, 1)';
            ctx.fillRect(0, 0, width, height);
            
            stars.forEach(star => {
                star.pz = star.z;
                star.z -= speed;

                if (star.z <= 0) {
                    star.z = width; star.pz = width;
                    star.x = Math.random() * width * 2 - width;
                    star.y = Math.random() * height * 2 - height;
                }

                const k = 128.0 / star.z;
                const px = star.x * k + width / 2;
                const py = star.y * k + height / 2;
                
                const pk = 128.0 / star.pz;
                const ppx = star.x * pk + width / 2;
                const ppy = star.y * pk + height / 2;
                
                const opacity = Math.min(1, (1 - star.z / width) * 2);

                if (px >= 0 && px <= width && py >= 0 && py <= height) {
                    if (isWarping) {
                        ctx.beginPath();
                        ctx.moveTo(ppx, ppy);
                        ctx.lineTo(px, py);
                        ctx.lineWidth = (1 - star.z / width) * 3;
                        ctx.strokeStyle = `rgba(255, 255, 255, ${opacity})`;
                        ctx.stroke();
                    } else {
                        const size = Math.max(0.5, (1 - star.z / width) * 2);
                        ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                        ctx.fillRect(px, py, size, size);
                    }
                }
            });
            requestAnimationFrame(drawStars);
        }
        drawStars();

        // --- TRANSITION LOGIC ---
        function startJourney() {
            speed = 40; 
            isWarping = true;
            const intro = document.getElementById('intro-overlay');
            intro.style.transform = 'scale(2)'; 
            intro.style.opacity = '0';

            setTimeout(() => {
                intro.style.display = 'none';
                speed = 0.5;
                isWarping = false;
                document.getElementById('main-nav').style.opacity = '1';
                
                // Show the home section
                const homeSection = document.getElementById('home');
                homeSection.style.display = 'flex'; // Uses flex to maintain vertical center
                void homeSection.offsetWidth; 
                homeSection.classList.add('active');
            }, 1000); 
        }

        // --- NAVIGATION LOGIC ---
        function showPage(pageId) {
            const sections = document.querySelectorAll('.page-section');
            sections.forEach(sec => {
                sec.classList.remove('active');
                sec.style.display = 'none'; 
            });
            
            const links = document.querySelectorAll('.nav-links a');
            links.forEach(link => link.classList.remove('active'));

            const targetSection = document.getElementById(pageId);
            if(targetSection) {
                targetSection.style.display = 'flex';
                targetSection.classList.add('active');
            }
            
            const targetLink = document.getElementById('link-' + pageId);
            if(targetLink) targetLink.classList.add('active');
            
            window.scrollTo(0,0);
        }

        // --- CHATBOT LOGIC ---
        function toggleChat() {
            const windowEl = document.getElementById('chatbot-window');
            const icon = document.getElementById('chat-icon');
            if (windowEl.style.display === 'flex') {
                windowEl.style.display = 'none';
                icon.textContent = '▲';
            } else {
                windowEl.style.display = 'flex';
                icon.textContent = '▼';
            }
        }

        function handleChat(e) {
            if (e.key === 'Enter') sendMsg();
        }

        function sendMsg() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;

            const msgContainer = document.getElementById('chatbot-messages');
            
            const userDiv = document.createElement('div');
            userDiv.style.textAlign = 'right';
            // FLAW 4 FIXED: Restored standard backticks so the script runs properly
            userDiv.innerHTML = `<span style="background:black; color:white; padding:10px; border-radius:8px; margin-bottom:10px; display:inline-block;">${msg}</span>`;
            msgContainer.appendChild(userDiv);
            
            input.value = '';

            setTimeout(() => {
                const botDiv = document.createElement('div');
                botDiv.innerHTML = `<span class="bot-msg">Aryan is currently optimizing his Power BI dashboard, but he'll get back to you soon. Please use the Contact page to send a formal email.</span>`;
                msgContainer.appendChild(botDiv);
                msgContainer.scrollTop = msgContainer.scrollHeight;
            }, 600);
        }
    </script>
</body>
</html>
